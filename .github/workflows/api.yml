name: API Services CI/CD

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'apis/auth/**'
      - 'apis/care/**'
      - 'apis/community/**'
      - 'apis/progress/**'
      - 'apis/wellness/**'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'apis/auth/**'
      - 'apis/care/**'
      - 'apis/community/**'
      - 'apis/progress/**'
      - 'apis/wellness/**'
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to build and deploy'
        required: true
        type: choice
        options:
          - auth
          - care
          - community
          - progress
          - wellness

env:
  AZURE_RESOURCE_GROUP: sunstone-mind-rg
  AZURE_CONTAINER_REGISTRY: sunstonemindacr
  NODE_VERSION: '20'

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.changes.outputs.services }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed services
        id: changes
        run: |
          SERVICES="auth care community progress wellness"
          CHANGED_SERVICES=""
          
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            CHANGED_SERVICES="${{ github.event.inputs.service }}"
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            # For PRs, compare against the base branch
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.sha }}"
            for service in $SERVICES; do
              if git diff --name-only $BASE_SHA $HEAD_SHA | grep -q "^apis/$service/"; then
                if [ -z "$CHANGED_SERVICES" ]; then
                  CHANGED_SERVICES="$service"
                else
                  CHANGED_SERVICES="$CHANGED_SERVICES $service"
                fi
              fi
            done
          else
            # For pushes, check changed files
            if [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
              for service in $SERVICES; do
                if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q "^apis/$service/"; then
                  if [ -z "$CHANGED_SERVICES" ]; then
                    CHANGED_SERVICES="$service"
                  else
                    CHANGED_SERVICES="$CHANGED_SERVICES $service"
                  fi
                fi
              done
            else
              # If before SHA is not available, check all services
              CHANGED_SERVICES="$SERVICES"
            fi
          fi
          
          if [ -z "$CHANGED_SERVICES" ]; then
            # If no specific changes detected, check all services
            CHANGED_SERVICES="$SERVICES"
          fi
          
          echo "services=$CHANGED_SERVICES" >> $GITHUB_OUTPUT
          echo "Changed services: $CHANGED_SERVICES"

  test:
    name: Run Tests - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: detect-changes
    if: contains(needs.detect-changes.outputs.services, matrix.service) || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        service: [auth, care, community, progress, wellness]
    defaults:
      run:
        working-directory: ./apis/${{ matrix.service }}

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apis/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Discover and run all unit tests
        run: |
          # Automatically discovers and runs all test files matching pattern: src/tests/**/*.test.ts
          # Any new test file added to src/tests/ directory will be automatically included
          echo "Running all unit tests from src/tests/**/*.test.ts"
          npm test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          PORT: 3001

      - name: Install Newman
        run: npm install -g newman

      - name: Create test results directory
        run: mkdir -p test-results

      - name: Discover and run all Postman collection tests
        id: postman-tests
        run: |
          # Automatically discovers and runs all Postman collections (*.postman_collection.json) in tests/postman/
          # Any new Postman collection added will be automatically discovered and executed
          # Looks for matching environment files (*.postman_environment.json) with same base name
          COLLECTIONS=$(find tests/postman -name "*.postman_collection.json" -type f 2>/dev/null || true)
          
          if [ -z "$COLLECTIONS" ]; then
            echo "No Postman collections found"
            exit 0
          fi
          
          # Run each collection found
          for collection in $COLLECTIONS; do
            echo "Running collection: $collection"
            collection_name=$(basename "$collection" .postman_collection.json)
            
            # Look for matching environment file
            env_file="tests/postman/${collection_name}.postman_environment.json"
            
            if [ -f "$env_file" ]; then
              echo "Using environment file: $env_file"
              newman run "$collection" \
                --environment "$env_file" \
                --reporters cli,json \
                --reporter-json-export "test-results/newman-${collection_name}-results.json"
            else
              echo "No environment file found for $collection, running without environment"
              newman run "$collection" \
                --reporters cli,json \
                --reporter-json-export "test-results/newman-${collection_name}-results.json"
            fi
            
            # Capture exit code
            TEST_EXIT_CODE=$?
            if [ $TEST_EXIT_CODE -ne 0 ]; then
              echo "Collection $collection failed with exit code $TEST_EXIT_CODE"
            fi
          done
        continue-on-error: true
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          PORT: 3001

      - name: Publish test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.service }}
          path: |
            apis/${{ matrix.service }}/test-results/**/*
            apis/${{ matrix.service }}/coverage/**/*

  build:
    name: Build Docker Image - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [detect-changes, test]
    if: contains(needs.detect-changes.outputs.services, matrix.service) || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        service: [auth, care, community, progress, wellness]
    defaults:
      run:
        working-directory: ./apis/${{ matrix.service }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io
          username: ${{ secrets.AZURE_ACR_USERNAME }}
          password: ${{ secrets.AZURE_ACR_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ matrix.service }}-service
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./apis/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ matrix.service }}-service:buildcache
          cache-to: type=registry,ref=${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ matrix.service }}-service:buildcache,mode=max
          build-args: |
            NODE_ENV=production

  deploy:
    name: Deploy to Azure Web App - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [detect-changes, build]
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') && (contains(needs.detect-changes.outputs.services, matrix.service) || github.event_name == 'workflow_dispatch')
    strategy:
      matrix:
        service: [auth, care, community, progress, wellness]
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ matrix.service }}-service
          resource-group: ${{ env.AZURE_RESOURCE_GROUP }}
          images: ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ matrix.service }}-service:latest
          startup-command: 'npm start'

      - name: Azure logout
        run: az logout
