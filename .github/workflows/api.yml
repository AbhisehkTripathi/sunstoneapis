name: Auth Service CI/CD

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'apis/auth/**'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'apis/auth/**'
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: auth-service
  AZURE_RESOURCE_GROUP: sunstone-mind-rg
  AZURE_CONTAINER_REGISTRY: sunstonemindacr
  DOCKER_IMAGE_NAME: auth-service
  NODE_VERSION: '20'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apis/auth

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apis/auth/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Discover and run all unit tests
        run: |
          # Automatically discovers and runs all test files matching pattern: src/tests/**/*.test.ts
          # Any new test file added to src/tests/ directory will be automatically included
          echo "Running all unit tests from src/tests/**/*.test.ts"
          npm test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          PORT: 3001

      - name: Install Newman
        run: npm install -g newman

      - name: Create test results directory
        run: mkdir -p test-results

      - name: Discover and run all Postman collection tests
        id: postman-tests
        run: |
          # Automatically discovers and runs all Postman collections (*.postman_collection.json) in tests/postman/
          # Any new Postman collection added will be automatically discovered and executed
          # Looks for matching environment files (*.postman_environment.json) with same base name
          COLLECTIONS=$(find tests/postman -name "*.postman_collection.json" -type f)
          
          if [ -z "$COLLECTIONS" ]; then
            echo "No Postman collections found"
            exit 0
          fi
          
          # Run each collection found
          for collection in $COLLECTIONS; do
            echo "Running collection: $collection"
            collection_name=$(basename "$collection" .postman_collection.json)
            
            # Look for matching environment file
            env_file="tests/postman/${collection_name}.postman_environment.json"
            
            if [ -f "$env_file" ]; then
              echo "Using environment file: $env_file"
              newman run "$collection" \
                --environment "$env_file" \
                --reporters cli,json \
                --reporter-json-export "test-results/newman-${collection_name}-results.json"
            else
              echo "No environment file found for $collection, running without environment"
              newman run "$collection" \
                --reporters cli,json \
                --reporter-json-export "test-results/newman-${collection_name}-results.json"
            fi
            
            # Capture exit code
            TEST_EXIT_CODE=$?
            if [ $TEST_EXIT_CODE -ne 0 ]; then
              echo "Collection $collection failed with exit code $TEST_EXIT_CODE"
            fi
          done
        continue-on-error: true
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          PORT: 3001

      - name: Publish test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            apis/auth/test-results/**/*
            apis/auth/coverage/**/*

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: ./apis/auth

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io
          username: ${{ secrets.AZURE_ACR_USERNAME }}
          password: ${{ secrets.AZURE_ACR_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.DOCKER_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./apis/auth
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.DOCKER_IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.DOCKER_IMAGE_NAME }}:buildcache,mode=max
          build-args: |
            NODE_ENV=production

  deploy:
    name: Deploy to Azure Web App
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          resource-group: ${{ env.AZURE_RESOURCE_GROUP }}
          images: ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.DOCKER_IMAGE_NAME }}:latest
          startup-command: 'npm start'

      - name: Azure logout
        run: az logout

