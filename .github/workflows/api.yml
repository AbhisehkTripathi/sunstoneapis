name: API Services CI/CD

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'apis/auth/**'
      - 'apis/care/**'
      - 'apis/community/**'
      - 'apis/progress/**'
      - 'apis/wellness/**'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'apis/auth/**'
      - 'apis/care/**'
      - 'apis/community/**'
      - 'apis/progress/**'
      - 'apis/wellness/**'
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to build and deploy'
        required: true
        type: choice
        options:
          - auth
          - care
          - community
          - progress
          - wellness

env:
  AZURE_RESOURCE_GROUP: sunstone-mind-rg
  AZURE_CONTAINER_REGISTRY: sunstonemindacr
  NODE_VERSION: '20'

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      auth: ${{ steps.changes.outputs.auth }}
      care: ${{ steps.changes.outputs.care }}
      community: ${{ steps.changes.outputs.community }}
      progress: ${{ steps.changes.outputs.progress }}
      wellness: ${{ steps.changes.outputs.wellness }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed services
        id: changes
        run: |
          SERVICES="auth care community progress wellness"
          
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            SELECTED_SERVICE="${{ github.event.inputs.service }}"
            for service in $SERVICES; do
              if [ "$service" == "$SELECTED_SERVICE" ]; then
                echo "${service}=true" >> $GITHUB_OUTPUT
              else
                echo "${service}=false" >> $GITHUB_OUTPUT
              fi
            done
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            # For PRs, compare against the base branch
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.sha }}"
            CHANGED_FILES=$(git diff --name-only $BASE_SHA $HEAD_SHA || echo "")
            for service in $SERVICES; do
              if echo "$CHANGED_FILES" | grep -q "^apis/$service/"; then
                echo "${service}=true" >> $GITHUB_OUTPUT
              else
                echo "${service}=false" >> $GITHUB_OUTPUT
              fi
            done
          else
            # For pushes, check changed files
            if [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000" ]; then
              CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} || echo "")
            else
              # If before SHA is not available, check all files in current commit
              CHANGED_FILES=$(git diff-tree --no-commit-id --name-only -r ${{ github.sha }} || echo "")
            fi
            
            for service in $SERVICES; do
              if echo "$CHANGED_FILES" | grep -q "^apis/$service/"; then
                echo "${service}=true" >> $GITHUB_OUTPUT
              else
                echo "${service}=false" >> $GITHUB_OUTPUT
              fi
            done
          fi
          
          echo "Change detection complete"
          echo "auth: ${{ steps.changes.outputs.auth }}"
          echo "care: ${{ steps.changes.outputs.care }}"
          echo "community: ${{ steps.changes.outputs.community }}"
          echo "progress: ${{ steps.changes.outputs.progress }}"
          echo "wellness: ${{ steps.changes.outputs.wellness }}"

  test:
    name: Test ${{ matrix.service }} Service
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs[matrix.service] == 'true'
    strategy:
      matrix:
        service: [auth, care, community, progress, wellness]
    defaults:
      run:
        working-directory: ./apis/${{ matrix.service }}

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Check if service should run
        id: check
        run: |
          SERVICE="${{ matrix.service }}"
          if [ "$SERVICE" == "auth" ] && [ "${{ needs.detect-changes.outputs.auth }}" == "true" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "$SERVICE" == "care" ] && [ "${{ needs.detect-changes.outputs.care }}" == "true" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "$SERVICE" == "community" ] && [ "${{ needs.detect-changes.outputs.community }}" == "true" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "$SERVICE" == "progress" ] && [ "${{ needs.detect-changes.outputs.progress }}" == "true" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "$SERVICE" == "wellness" ] && [ "${{ needs.detect-changes.outputs.wellness }}" == "true" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Skip if service not changed
        if: steps.check.outputs.should_run != 'true'
        run: |
          echo "Service ${{ matrix.service }} was not changed, skipping tests"
          exit 0

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apis/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript Type Check
        run: |
          echo "Running TypeScript type checking..."
          npx tsc --noEmit || echo "TypeScript check completed with errors (non-blocking)"
        continue-on-error: true

      - name: Build TypeScript
        run: |
          echo "Building TypeScript to verify compilation..."
          npm run build || echo "Build check completed (non-blocking)"
        continue-on-error: true

      - name: Lint Code (if available)
        run: |
          if npm run | grep -q "lint"; then
            echo "Running linter..."
            npm run lint || echo "Linting completed with warnings (non-blocking)"
          else
            echo "No lint script found, skipping..."
          fi
        continue-on-error: true

      - name: Discover and run all unit tests
        run: |
          # Automatically discovers and runs all test files matching pattern: src/tests/**/*.test.ts
          # Any new test file added to src/tests/ directory will be automatically included
          echo "Running all unit tests from src/tests/**/*.test.ts"
          npm test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          PORT: 3001

      - name: Run test coverage (if available)
        run: |
          if npm run | grep -q "test:coverage"; then
            echo "Running test coverage..."
            npm run test:coverage
          elif npm run | grep -q "coverage"; then
            echo "Running coverage..."
            npm run coverage
          else
            echo "No coverage script found, skipping..."
          fi
        continue-on-error: true
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          PORT: 3001

      - name: Install Newman
        run: npm install -g newman

      - name: Create test results directory
        run: mkdir -p test-results

      - name: Discover and run all Postman collection tests
        id: postman-tests
        run: |
          # Automatically discovers and runs all Postman collections (*.postman_collection.json) in tests/postman/
          # Any new Postman collection added will be automatically discovered and executed
          # Looks for matching environment files (*.postman_environment.json) with same base name
          COLLECTIONS=$(find tests/postman -name "*.postman_collection.json" -type f 2>/dev/null || true)
          
          if [ -z "$COLLECTIONS" ]; then
            echo "No Postman collections found"
            exit 0
          fi
          
          # Run each collection found
          for collection in $COLLECTIONS; do
            echo "Running collection: $collection"
            collection_name=$(basename "$collection" .postman_collection.json)
            
            # Look for matching environment file
            env_file="tests/postman/${collection_name}.postman_environment.json"
            
            if [ -f "$env_file" ]; then
              echo "Using environment file: $env_file"
              newman run "$collection" \
                --environment "$env_file" \
                --reporters cli,json \
                --reporter-json-export "test-results/newman-${collection_name}-results.json"
            else
              echo "No environment file found for $collection, running without environment"
              newman run "$collection" \
                --reporters cli,json \
                --reporter-json-export "test-results/newman-${collection_name}-results.json"
            fi
            
            # Capture exit code
            TEST_EXIT_CODE=$?
            if [ $TEST_EXIT_CODE -ne 0 ]; then
              echo "Collection $collection failed with exit code $TEST_EXIT_CODE"
            fi
          done
        continue-on-error: true
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          PORT: 3001

      - name: Check test file count
        run: |
          TEST_COUNT=$(find src/tests -name "*.test.ts" -type f 2>/dev/null | wc -l || echo "0")
          echo "Found $TEST_COUNT test files"
          if [ "$TEST_COUNT" -eq "0" ]; then
            echo "⚠️ Warning: No test files found in src/tests/"
          else
            echo "✓ Test files found: $TEST_COUNT"
          fi
        continue-on-error: true

      - name: Verify service health endpoint
        run: |
          echo "Checking if service has health check endpoint..."
          if [ -f "src/index.ts" ] || [ -f "src/index.js" ]; then
            if grep -r "health" src/ --include="*.ts" --include="*.js" > /dev/null 2>&1; then
              echo "✓ Health check endpoint found"
            else
              echo "⚠️ Warning: No health check endpoint found"
            fi
          fi
        continue-on-error: true

      - name: Check for security vulnerabilities
        run: |
          echo "Checking for known security vulnerabilities..."
          npm audit --audit-level=moderate || echo "Security audit completed (non-blocking)"
        continue-on-error: true

      - name: Verify environment variables
        run: |
          echo "Checking required environment variables..."
          if [ -f ".env.example" ]; then
            echo "✓ .env.example file found"
            cat .env.example | grep -v "^#" | grep -v "^$" | cut -d'=' -f1 | sort
          else
            echo "⚠️ No .env.example file found"
          fi
        continue-on-error: true

      - name: Publish test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.service }}
          path: |
            apis/${{ matrix.service }}/test-results/**/*
            apis/${{ matrix.service }}/coverage/**/*
            apis/${{ matrix.service }}/dist/**/*
          retention-days: 7

  build:
    name: Build ${{ matrix.service }} Service
    runs-on: ubuntu-latest
    needs: [detect-changes, test]
    if: needs.detect-changes.outputs[matrix.service] == 'true'
    strategy:
      matrix:
        service: [auth, care, community, progress, wellness]
    steps:
      - name: Check if service should run
        id: check
        run: |
          SERVICE="${{ matrix.service }}"
          if [ "$SERVICE" == "auth" ] && [ "${{ needs.detect-changes.outputs.auth }}" == "true" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "$SERVICE" == "care" ] && [ "${{ needs.detect-changes.outputs.care }}" == "true" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "$SERVICE" == "community" ] && [ "${{ needs.detect-changes.outputs.community }}" == "true" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "$SERVICE" == "progress" ] && [ "${{ needs.detect-changes.outputs.progress }}" == "true" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "$SERVICE" == "wellness" ] && [ "${{ needs.detect-changes.outputs.wellness }}" == "true" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Skip if service not changed
        if: steps.check.outputs.should_run != 'true'
        run: |
          echo "Service ${{ matrix.service }} was not changed, skipping build"
          exit 0

      - name: Checkout code
        if: steps.check.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Verify Dockerfile exists
        run: |
          if [ -f "apis/${{ matrix.service }}/Dockerfile" ]; then
            echo "✓ Dockerfile found"
            echo "Dockerfile contents preview:"
            head -10 apis/${{ matrix.service }}/Dockerfile
          else
            echo "❌ Error: Dockerfile not found in apis/${{ matrix.service }}/"
            exit 1
          fi

      - name: Verify package.json exists
        if: steps.check.outputs.should_run == 'true'
        run: |
          if [ -f "apis/${{ matrix.service }}/package.json" ]; then
            echo "✓ package.json found"
            echo "Service name: $(grep -E '"name"' apis/${{ matrix.service }}/package.json | head -1)"
          else
            echo "❌ Error: package.json not found"
            exit 1
          fi

      - name: Set up Docker Buildx
        if: steps.check.outputs.should_run == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Azure Container Registry
        if: steps.check.outputs.should_run == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io
          username: ${{ secrets.AZURE_ACR_USERNAME }}
          password: ${{ secrets.AZURE_ACR_PASSWORD }}

      - name: Extract metadata
        if: steps.check.outputs.should_run == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ matrix.service }}-service
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        if: steps.check.outputs.should_run == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./apis/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ matrix.service }}-service:buildcache
          cache-to: type=registry,ref=${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ matrix.service }}-service:buildcache,mode=max
          build-args: |
            NODE_ENV=production

  deploy:
    name: Deploy ${{ matrix.service }} Service
    runs-on: ubuntu-latest
    needs: [detect-changes, build]
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') && needs.detect-changes.outputs[matrix.service] == 'true'
    strategy:
      matrix:
        service: [auth, care, community, progress, wellness]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}

    steps:
      - name: Check if service should run
        id: check
        run: |
          SERVICE="${{ matrix.service }}"
          if [ "$SERVICE" == "auth" ] && [ "${{ needs.detect-changes.outputs.auth }}" == "true" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "$SERVICE" == "care" ] && [ "${{ needs.detect-changes.outputs.care }}" == "true" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "$SERVICE" == "community" ] && [ "${{ needs.detect-changes.outputs.community }}" == "true" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "$SERVICE" == "progress" ] && [ "${{ needs.detect-changes.outputs.progress }}" == "true" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "$SERVICE" == "wellness" ] && [ "${{ needs.detect-changes.outputs.wellness }}" == "true" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Skip if service not changed
        if: steps.check.outputs.should_run != 'true'
        run: |
          echo "Service ${{ matrix.service }} was not changed, skipping deployment"
          exit 0

      - name: Checkout code
        if: steps.check.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Login to Azure
        if: steps.check.outputs.should_run == 'true'
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        if: steps.check.outputs.should_run == 'true'
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ matrix.service }}-service
          resource-group: ${{ env.AZURE_RESOURCE_GROUP }}
          images: ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ matrix.service }}-service:latest
          startup-command: 'npm start'

      - name: Azure logout
        if: steps.check.outputs.should_run == 'true'
        run: az logout
