name: Microservices CI/CD

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'apis/auth/**'
      - 'apis/care/**'
      - 'apis/community/**'
      - 'apis/progress/**'
      - 'apis/wellness/**'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'apis/auth/**'
      - 'apis/care/**'
      - 'apis/community/**'
      - 'apis/progress/**'
      - 'apis/wellness/**'
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to build and deploy'
        required: true
        type: choice
        options:
          - auth
          - care
          - community
          - progress
          - wellness
          - all

env:
  NODE_VERSION: '20'

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      auth: ${{ steps.changes.outputs.auth }}
      care: ${{ steps.changes.outputs.care }}
      community: ${{ steps.changes.outputs.community }}
      progress: ${{ steps.changes.outputs.progress }}
      wellness: ${{ steps.changes.outputs.wellness }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed services
        id: changes
        run: |
          SERVICES="auth care community progress wellness"
          
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            SELECTED_SERVICE="${{ github.event.inputs.service }}"
            if [ "$SELECTED_SERVICE" == "all" ]; then
              for service in $SERVICES; do
                echo "${service}=true" >> $GITHUB_OUTPUT
              done
            else
              for service in $SERVICES; do
                if [ "$service" == "$SELECTED_SERVICE" ]; then
                  echo "${service}=true" >> $GITHUB_OUTPUT
                else
                  echo "${service}=false" >> $GITHUB_OUTPUT
                fi
              done
            fi
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.sha }}"
            CHANGED_FILES=$(git diff --name-only $BASE_SHA $HEAD_SHA || echo "")
            for service in $SERVICES; do
              if echo "$CHANGED_FILES" | grep -q "^apis/$service/"; then
                echo "${service}=true" >> $GITHUB_OUTPUT
              else
                echo "${service}=false" >> $GITHUB_OUTPUT
              fi
            done
          else
            if [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
              CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} || echo "")
            else
              CHANGED_FILES=$(git diff-tree --no-commit-id --name-only -r ${{ github.sha }} || echo "")
            fi
            
            for service in $SERVICES; do
              if echo "$CHANGED_FILES" | grep -q "^apis/$service/"; then
                echo "${service}=true" >> $GITHUB_OUTPUT
              else
                echo "${service}=false" >> $GITHUB_OUTPUT
              fi
            done
          fi
          
          echo "Change detection complete:"
          echo "  auth: ${{ steps.changes.outputs.auth }}"
          echo "  care: ${{ steps.changes.outputs.care }}"
          echo "  community: ${{ steps.changes.outputs.community }}"
          echo "  progress: ${{ steps.changes.outputs.progress }}"
          echo "  wellness: ${{ steps.changes.outputs.wellness }}"

  lint-and-typecheck:
    name: Lint & TypeScript Check - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: detect-changes
    strategy:
      matrix:
        service: [auth, care, community, progress, wellness]
    defaults:
      run:
        working-directory: ./apis/${{ matrix.service }}

    steps:
      - name: Check if service should run
        id: check
        run: |
          SERVICE="${{ matrix.service }}"
          if [ "$SERVICE" == "auth" ] && [ "${{ needs.detect-changes.outputs.auth }}" == "true" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "$SERVICE" == "care" ] && [ "${{ needs.detect-changes.outputs.care }}" == "true" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "$SERVICE" == "community" ] && [ "${{ needs.detect-changes.outputs.community }}" == "true" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "$SERVICE" == "progress" ] && [ "${{ needs.detect-changes.outputs.progress }}" == "true" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "$SERVICE" == "wellness" ] && [ "${{ needs.detect-changes.outputs.wellness }}" == "true" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip if service not changed
        if: steps.check.outputs.should_run != 'true'
        run: |
          echo "Service ${{ matrix.service }} was not changed, skipping lint and typecheck"
          exit 0

      - name: Checkout code
        if: steps.check.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.check.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apis/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        if: steps.check.outputs.should_run == 'true'
        run: npm ci

      - name: TypeScript Type Check
        if: steps.check.outputs.should_run == 'true'
        run: |
          echo "Running TypeScript type checking for ${{ matrix.service }} service..."
          npx tsc --noEmit
        continue-on-error: false

      - name: Lint Code
        if: steps.check.outputs.should_run == 'true'
        run: |
          if npm run | grep -q "lint"; then
            echo "Running linter for ${{ matrix.service }} service..."
            npm run lint
          elif [ -f "node_modules/.bin/eslint" ] || npx eslint --version 2>/dev/null; then
            echo "Running ESLint directly for ${{ matrix.service }} service..."
            npx eslint "src/**/*.ts" --ext .ts || echo "Linting completed with warnings"
          else
            echo "No lint script or ESLint found, skipping lint step..."
          fi
        continue-on-error: false

  docker-build:
    name: Docker Build - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [detect-changes, lint-and-typecheck]
    strategy:
      matrix:
        service: [auth, care, community, progress, wellness]

    steps:
      - name: Check if service should run
        id: check
        run: |
          SERVICE="${{ matrix.service }}"
          if [ "$SERVICE" == "auth" ] && [ "${{ needs.detect-changes.outputs.auth }}" == "true" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "$SERVICE" == "care" ] && [ "${{ needs.detect-changes.outputs.care }}" == "true" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "$SERVICE" == "community" ] && [ "${{ needs.detect-changes.outputs.community }}" == "true" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "$SERVICE" == "progress" ] && [ "${{ needs.detect-changes.outputs.progress }}" == "true" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "$SERVICE" == "wellness" ] && [ "${{ needs.detect-changes.outputs.wellness }}" == "true" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip if service not changed
        if: steps.check.outputs.should_run != 'true'
        run: |
          echo "Service ${{ matrix.service }} was not changed, skipping Docker build"
          exit 0

      - name: Checkout code
        if: steps.check.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Verify Dockerfile exists
        if: steps.check.outputs.should_run == 'true'
        run: |
          if [ ! -f "apis/${{ matrix.service }}/Dockerfile" ]; then
            echo "❌ Error: Dockerfile not found in apis/${{ matrix.service }}/"
            exit 1
          fi
          echo "✓ Dockerfile found for ${{ matrix.service }} service"

      - name: Set up Docker Buildx
        if: steps.check.outputs.should_run == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        if: steps.check.outputs.should_run == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./apis/${{ matrix.service }}
          push: false
          tags: ${{ matrix.service }}-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production

      - name: Verify Docker image
        if: steps.check.outputs.should_run == 'true'
        run: |
          echo "Verifying Docker image for ${{ matrix.service }} service..."
          docker images | grep "${{ matrix.service }}-service" || exit 1
          echo "✓ Docker image built successfully"

