events {}

http {
    upstream auth_api_upstream {
        server auth:3001;
    }

    upstream wellness_api_upstream {
        server wellness:3002;
    }

    upstream care_api_upstream {
        server care:3003;
    }

    upstream community_api_upstream {
        server community:3004;
    }

    upstream progress_api_upstream {
        server progress:3005;
    }

    server {
        listen 80;
        server_name localhost;

        # Proxy Auth APIs
        location /auth/ {
            proxy_pass http://auth_api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            rewrite ^/auth/(.*)$ /$1 break;
        }

        # Proxy Wellness APIs
        location /wellness/ {
            proxy_pass http://wellness_api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            rewrite ^/wellness/(.*)$ /$1 break;
        }

        # Proxy Care APIs
        location /care/ {
            proxy_pass http://care_api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            rewrite ^/care/(.*)$ /$1 break;
        }

        # Proxy Community APIs
        location /community/ {
            proxy_pass http://community_api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            rewrite ^/community/(.*)$ /$1 break;
        }

        # Proxy Progress APIs
        location /progress/ {
            proxy_pass http://progress_api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            rewrite ^/progress/(.*)$ /$1 break;
        }

        # Frontend
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri /index.html;
        }

        error_page 404 /404.html;
        location = /404.html {
            root /usr/share/nginx/html;
            internal;
        }

        location ~ /\. {
            deny all;
        }
    }
}
