version: "3.9"

services:
  auth:
    build: ./auth
    container_name: auth
    ports:
      - "3001:3000"
    env_file:
      - ./auth/.env
    networks:
      - backend


  wellness:
    build: ./wellness
    container_name: wellness
    ports:
      - "3002:3000"
    env_file:
      - ./wellness/.env
    networks:
      - backend

  care:
    build: ./care
    container_name: care
    ports:
      - "3003:3000"
    env_file:
      - ./care/.env
    networks:
      - backend

  community:
    build: ./community
    container_name: community
    ports:
      - "3004:3000"
    env_file:
      - ./community/.env
    networks:
      - backend

  progress:
    build: ./progress
    container_name: progress
    ports:
      - "3005:3000"
    env_file:
      - ./progress/.env
    networks:
      - backend
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: sunstonemind
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend
  custom-nginx:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth
      - wellness
      - care
      - community
      - progress
    networks:
      - backend
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3006:3000"
    networks:
      - monitoring
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
networks:
  backend:
    driver: bridge
  monitoring:
    driver: bridge
volumes:
  pgdata: {}
